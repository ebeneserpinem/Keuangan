<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; max-width: 900px; margin: auto; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        h2 { color: #38bdf8; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        th { color: #94a3b8; text-transform: uppercase; font-size: 12px; }
        .nominal { text-align: right; font-family: monospace; color: #10b981; }
        #chartContainer { width: 300px; margin: auto; }
    </style>
</head>
<body>
    <h2>💰 Finance Real-Time Dashboard</h2>
    
    <div class="card">
        <h3>Statistik Kategori</h3>
        <div id="chartContainer"><canvas id="chart"></canvas></div>
    </div>

    <div class="card">
        <h3>10 Transaksi Terakhir</h3>
        <table id="table">
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Deskripsi</th>
                    <th>Kategori</th>
                    <th style="text-align: right;">Jumlah</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const API = "https://finance-worker.ebeneserpinem6.workers.dev";
        let chart;

        async function loadData() {
            try {
                // Load Chart
                const resChart = await fetch(API + "/api/data");
                const dataChart = await resChart.json();
                
                const ctx = document.getElementById("chart").getContext("2d");
                if (chart) chart.destroy();
                chart = new Chart(ctx, {
                    type: "pie",
                    data: {
                        labels: ["Dana Darurat", "Investasi", "Pengeluaran"],
                        datasets: [{
                            data: [dataChart.dana_darurat, dataChart.investasi, dataChart.pengeluaran],
                            backgroundColor: ["#facc15", "#22c55e", "#ef4444"],
                            borderWidth: 0
                        }]
                    }
                });

                // Load Tabel
                const resTable = await fetch(API + "/api/transaksi");
                const dataTable = await resTable.json();
                const tbody = document.querySelector("#table tbody");
                tbody.innerHTML = dataTable.map(t => `
                    <tr>
                        <td>${t.tanggal}</td>
                        <td>${t.deskripsi}</td>
                        <td><small>${t.kategori.toUpperCase()}</small></td>
                        <td class="nominal">Rp ${Number(t.jumlah).toLocaleString('id-ID')}</td>
                    </tr>
                `).join("");
            } catch (e) { console.error("Update Error:", e); }
        }

        loadData();
        setInterval(loadData, 10000); // Auto update tiap 10 detik
    </script>
</body>
</html>
