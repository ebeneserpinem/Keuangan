<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; max-width: 800px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px solid #334155; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .val { color: #38bdf8; font-size: 2.2em; font-weight: bold; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-top: 10px; }
        th, td { padding: 8px; border-bottom: 1px solid #334155; text-align: left; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="card">
        <h3>💰 Saldo Net Saat Ini</h3>
        <div class="val" id="saldo-net">Rp 0</div>
    </div>
    <div class="grid">
        <div class="card">
            <h4>📊 Alokasi Dana</h4>
            <canvas id="chart"></canvas>
        </div>
        <div class="card">
            <h4>📝 Riwayat</h4>
            <table id="table">
                <thead><tr><th>Kategori</th><th>Jumlah</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script>
        const API = "https://finance-worker.ebeneserpinem6.workers.dev";
        let chartObj;
        async function load() {
            const r = await fetch(API + "/api/data");
            const d = await r.json();
            document.getElementById("saldo-net").innerText = "Rp " + d.saldo_net_display.toLocaleString('id-ID');
            const ctx = document.getElementById("chart").getContext("2d");
            if(chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Darurat', 'Investasi', 'Keluar'],
                    datasets: [{ data: [d.dana_darurat, d.investasi, d.pengeluaran], backgroundColor: ['#facc15', '#22c55e', '#ef4444'] }]
                }
            });
            const rT = await fetch(API + "/api/transaksi");
            const list = await rT.json();
            document.querySelector("#table tbody").innerHTML = list.map(t => `<tr><td>${t.kategori}</td><td>Rp ${t.jumlah.toLocaleString('id-ID')}</td></tr>`).join("");
        }
        load(); setInterval(load, 15000);
    </script>
</body>
</html>
