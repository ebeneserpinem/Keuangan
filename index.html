<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sentinel Finance - Ultra Premium Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --brand: #6366f1;
            --success: #10b981;
            --danger: #f43f5e;
            --bg: #0b0f1a;
            --card-bg: rgba(23, 28, 48, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text-p: #f8fafc;
            --text-s: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-p);
            min-height: 100vh; display: flex; overflow-x: hidden;
            background-image: radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 40%);
        }

        nav {
            width: 280px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); padding: 40px 20px;
            display: flex; flex-direction: column; gap: 30px; position: sticky; top: 0; height: 100vh;
        }
        @media (max-width: 1024px) { nav { display: none; } }

        .nav-item {
            padding: 14px 20px; border-radius: 12px; color: var(--text-s); font-weight: 600;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .nav-item.active { background: var(--brand); color: white; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        main { flex: 1; padding: 40px; max-width: 1200px; margin: auto; width: 100%; }

        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 28px; padding: 30px; backdrop-filter: blur(10px);
            transition: 0.3s; margin-bottom: 25px;
        }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .label { font-size: 11px; font-weight: 700; color: var(--text-s); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .value { font-size: 2.2rem; font-weight: 800; font-family: 'Space Grotesk', sans-serif; }

        .grid-visuals { display: grid; grid-template-columns: 1fr 1.5fr; gap: 25px; margin-bottom: 25px; }
        @media (max-width: 768px) { .grid-visuals { grid-template-columns: 1fr; } }

        .gauge-wrap { position: relative; width: 180px; height: 180px; margin: 0 auto; }
        .gauge-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }

        input, select {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 14px 18px; border-radius: 14px; color: white; font-weight: 500;
        }
        .btn-add { background: var(--brand); border: none; padding: 14px; border-radius: 14px; color: white; font-weight: 700; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.03); padding: 18px; text-align: left; font-size: 11px; color: var(--text-s); }
        td { padding: 18px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .type-pill { padding: 5px 10px; border-radius: 100px; font-size: 10px; font-weight: 800; }
        .pill-in { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .pill-out { background: rgba(244, 63, 94, 0.1); color: var(--danger); }

        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="text-align: center; width: 350px;">
        <h2 style="margin-bottom: 20px;">Sentinel <span style="color:var(--brand)">Auth</span></h2>
        <input type="password" id="passInput" placeholder="Sandi Akses" style="text-align: center; margin-bottom: 15px; width: 100%;">
        <button onclick="login()" class="btn-add" style="width: 100%;">AUTHENTICATE</button>
    </div>
</div>

<nav>
    <div style="font-size: 22px; font-weight: 800; padding: 0 20px;">Sentinel<span style="color:var(--brand)">.</span></div>
    <div style="margin-top: 20px;">
        <div class="nav-item active">🏠 Dashboard</div>
        <div class="nav-item">📈 Investasi</div>
        <div class="nav-item">🛡️ Proteksi</div>
    </div>
</nav>

<main id="main-content" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1 style="font-size: 24px;">Ikhtisar Keuangan</h1>
        <button onclick="logout()" class="btn-add" style="background: var(--danger); padding: 10px 20px;">Lock Vault</button>
    </div>

    <div class="stats-grid">
        <div class="card"><span class="label">Total Aset</span><div id="v-asset" class="value" style="color: var(--success);">Rp 0</div></div>
        <div class="card"><span class="label">Pengeluaran Bulan Ini</span><div id="v-exp" class="value" style="color: var(--danger);">Rp 0</div></div>
        <div class="card"><span class="label">Likuiditas</span><div id="v-net" class="value" style="color: var(--brand);">Rp 0</div></div>
    </div>

    <div class="grid-visuals">
        <div class="card" style="display: flex; flex-direction: column; align-items: center; text-align: center;">
            <span class="label">Dana Darurat</span>
            <div class="gauge-wrap">
                <canvas id="gaugeChart"></canvas>
                <div class="gauge-center"><div id="perc-text" style="font-size: 24px; font-weight: 800;">0%</div></div>
            </div>
            <div id="target-msg" style="color: var(--text-s); font-size: 12px; margin-top: 15px;">Target: Rp 20.000.000</div>
        </div>
        <div class="card">
            <span class="label">Tren Portofolio (30 Hari)</span>
            <div style="height: 180px;"><canvas id="lineChart"></canvas></div>
        </div>
    </div>

    <div class="card">
        <span class="label">Transaksi Baru</span>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
            <select id="f-kat">
                <option value="pemasukan">PEMASUKAN</option>
                <option value="pengeluaran">PENGELUARAN</option>
                <option value="dana_darurat">DANA DARURAT</option>
            </select>
            <input type="text" id="f-desc" placeholder="Keterangan">
            <input type="number" id="f-amt" placeholder="Nominal">
            <button onclick="simpan()" class="btn-add">SIMPAN</button>
        </div>
    </div>

    <div class="card" style="padding: 0; overflow: hidden;">
        <div style="padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;">
            <span class="label" style="margin:0">Log Transaksi</span>
            <select id="monthFilter" onchange="renderTable()" style="padding: 5px 15px; font-size: 12px; width: auto; border-radius: 8px;">
                <option value="all">SEMUA BULAN</option>
            </select>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>TANGGAL</th><th>TIPE</th><th>DESKRIPSI</th><th style="text-align: right;">NOMINAL</th><th style="text-align: center;">AKSI</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</main>

<script>
    const API = "https://finance-worker.ebeneserpinem6.workers.dev";
    const TARGET_VAL = 20000000;
    let gaugeChart, lineChart, rawData = [];

    function login() {
        if(document.getElementById('passInput').value === "12345") {
            localStorage.setItem("vault_token", "active");
            checkAuth();
        } else { alert("Sandi salah."); }
    }
    function logout() { localStorage.removeItem("vault_token"); location.reload(); }
    function checkAuth() {
        if(localStorage.getItem("vault_token")) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            refresh();
        }
    }

    async function refresh() {
        try {
            const res = await fetch(API + "/api/data");
            const d = await res.json();
            animateNumber("v-asset", d.totalAsset);
            animateNumber("v-exp", d.pengeluaran);
            animateNumber("v-net", d.saldoBersih);
            updateGauge(d.dana_darurat);
            loadTransactions();
        } catch (e) { console.error("Error refresh"); }
    }

    function animateNumber(id, end) {
        let start = 0; let dur = 1000; let obj = document.getElementById(id);
        let startT = null;
        function step(ts) {
            if (!startT) startT = ts;
            let prog = Math.min((ts - startT) / dur, 1);
            obj.innerText = "Rp " + Math.floor(prog * end).toLocaleString('id-ID');
            if (prog < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }

    function updateGauge(val) {
        const perc = Math.min(Math.round((val / TARGET_VAL) * 100), 100);
        document.getElementById('perc-text').innerText = perc + "%";
        const ctx = document.getElementById('gaugeChart');
        if(gaugeChart) gaugeChart.destroy();
        gaugeChart = new Chart(ctx, {
            type: 'doughnut',
            data: { datasets: [{ data: [val, Math.max(0, TARGET_VAL-val)], backgroundColor: ['#6366f1', 'rgba(255,255,255,0.05)'], borderWidth: 0, borderRadius: 10 }] },
            options: { cutout: '85%', plugins: { legend: { display: false } } }
        });
    }

    async function loadTransactions() {
        const res = await fetch(API + "/api/transaksi");
        rawData = await res.json();
        updateFilterOptions(rawData);
        renderTable();
    }

    function updateFilterOptions(data) {
        const filter = document.getElementById('monthFilter');
        const months = [...new Set(data.map(t => {
            const d = new Date(t.tanggal);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        }))].sort().reverse();
        let html = '<option value="all">SEMUA BULAN</option>';
        months.forEach(m => {
            const [y, mm] = m.split('-');
            const name = new Date(y, mm-1).toLocaleString('id-ID', { month: 'long', year: 'numeric' });
            html += `<option value="${m}">${name.toUpperCase()}</option>`;
        });
        filter.innerHTML = html;
    }

    function renderTable() {
        const fVal = document.getElementById('monthFilter').value;
        let filtered = rawData.filter(t => fVal === 'all' || `${new Date(t.tanggal).getFullYear()}-${String(new Date(t.tanggal).getMonth()+1).padStart(2,'0')}` === fVal);
        filtered.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));
        
        document.getElementById("tableBody").innerHTML = filtered.map(t => `
            <tr>
                <td>${new Date(t.tanggal).toLocaleDateString()}</td>
                <td><span class="type-pill pill-${t.kategori === 'pengeluaran' ? 'out' : 'in'}">${t.kategori.toUpperCase()}</span></td>
                <td>${t.deskripsi}</td>
                <td style="text-align: right; font-weight: 700;">Rp ${t.jumlah.toLocaleString('id-ID')}</td>
                <td style="text-align: center;"><button onclick="hapus('${t.id}')" style="background:none; border:none; color:var(--text-s); cursor:pointer;">✕</button></td>
            </tr>
        `).join("");
        updateLine(filtered);
    }

    function updateLine(data) {
        const ctx = document.getElementById('lineChart');
        if(lineChart) lineChart.destroy();
        const sorted = [...data].sort((a,b) => new Date(a.tanggal) - new Date(b.tanggal));
        let bal = 0; const pts = sorted.map(t => { bal += (t.kategori === 'pengeluaran' ? -t.jumlah : t.jumlah); return bal; });
        lineChart = new Chart(ctx, {
            type: 'line',
            data: { labels: sorted.map(t => ""), datasets: [{ data: pts, borderColor: '#6366f1', borderWidth: 3, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: 'rgba(99, 102, 241, 0.1)' }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    async function simpan() {
        const desc = document.getElementById('f-desc').value;
        const amt = document.getElementById('f-amt').value;
        if(!desc || !amt) return;
        await fetch(API + "/api/tambah", {
            method: "POST",
            body: JSON.stringify({ deskripsi: desc, jumlah: Number(amt), kategori: document.getElementById('f-kat').value, email_id: "user@mail.com" })
        });
        document.getElementById('f-desc').value = ""; document.getElementById('f-amt').value = "";
        refresh();
    }

    async function hapus(id) {
        if(confirm("Hapus?")) { await fetch(`${API}/api/hapus?id=${id}`, { method: "DELETE" }); refresh(); }
    }

    checkAuth();
</script>
</body>
</html>
