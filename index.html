<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#0f172a;
color:white;
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
border:1px solid #334155;
margin-bottom:20px;
}

.grid4{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.big{
font-size:2em;
font-weight:bold;
margin-top:10px;
}

.net{color:#38bdf8}
.asset{color:#22c55e}
.expense{color:#ef4444}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

.nominal{
font-family:monospace;
font-weight:bold;
}

.qris{color:#22c55e}
.transfer{color:#38bdf8}

button{
background:#38bdf8;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

select{
padding:6px;
border-radius:6px;
}

</style>

</head>

<body>

<!-- NET SALDO -->

<div class="card" style="text-align:center;border-top:4px solid #38bdf8">

<h2>Net Saldo</h2>

<div class="big net" id="net">Rp 0</div>

<p style="font-size:12px;color:#94a3b8">
Update: <span id="update">-</span>
</p>

</div>

<!-- TOTAL -->

<div class="grid4">

<div class="card">
Asset
<div class="big asset" id="asset">Rp 0</div>
</div>

<div class="card">
Dana Darurat
<div class="big asset" id="darurat">Rp 0</div>
</div>

<div class="card">
Investasi
<div class="big asset" id="investasi">Rp 0</div>
</div>

<div class="card">
Pengeluaran
<div class="big expense" id="expense">Rp 0</div>
</div>

</div>

<!-- CHART -->

<div class="card">

<h3>Grafik Keuangan Bulanan</h3>

<div style="margin-bottom:10px">

<select id="bulan">
<option value="all">Semua Bulan</option>
<option value="1">Jan</option>
<option value="2">Feb</option>
<option value="3">Mar</option>
<option value="4">Apr</option>
<option value="5">Mei</option>
<option value="6">Jun</option>
<option value="7">Jul</option>
<option value="8">Agu</option>
<option value="9">Sep</option>
<option value="10">Okt</option>
<option value="11">Nov</option>
<option value="12">Des</option>
</select>

<button onclick="refreshDashboard()">Lihat</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<canvas id="chartLine"></canvas>

</div>

<!-- TRANSAKSI -->

<div class="card">

<h3>Daftar Transaksi</h3>

<table>

<thead>

<tr>

<th>Tanggal</th>
<th>Kategori</th>
<th>Metode</th>
<th>Tujuan</th>
<th style="text-align:right">Jumlah</th>

</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

const API="https://finance-worker.ebeneserpinem6.workers.dev"

let chart

async function refreshDashboard(){

try{

/* SUMMARY */

const res=await fetch(API+"/api/data")
const d=await res.json()

const asset=d.dana_darurat+d.investasi

document.getElementById("net").innerText=
"Rp "+d.saldo_net_display.toLocaleString('id-ID')

document.getElementById("asset").innerText=
"Rp "+asset.toLocaleString('id-ID')

document.getElementById("darurat").innerText=
"Rp "+d.dana_darurat.toLocaleString('id-ID')

document.getElementById("investasi").innerText=
"Rp "+d.investasi.toLocaleString('id-ID')

document.getElementById("expense").innerText=
"Rp "+d.pengeluaran.toLocaleString('id-ID')

document.getElementById("update").innerText=
new Date().toLocaleTimeString()

/* CHART */

const bulan=document.getElementById("bulan").value

const chartRes=await fetch(API+"/api/chart?bulan="+bulan)
const data=await chartRes.json()

const ctx=document.getElementById("chartLine")

if(chart) chart.destroy()

chart=new Chart(ctx,{

type:'line',

data:{

labels:data.bulan,

datasets:[

{
label:'Asset',
data:data.asset,
borderColor:'#22c55e',
backgroundColor:'transparent',
tension:0.3
},

{
label:'Pengeluaran',
data:data.pengeluaran,
borderColor:'#ef4444',
backgroundColor:'transparent',
tension:0.3
}

]

},

options:{

plugins:{
legend:{labels:{color:'white'}}
},

scales:{
x:{ticks:{color:'white'}},
y:{ticks:{color:'white'}}
}

}

})

/* TRANSAKSI */

const resTable=await fetch(API+"/api/transaksi")
const list=await resTable.json()

const tbody=document.getElementById("table")

tbody.innerHTML=list.map(t=>{

let metode="Transfer"

if(
t.deskripsi &&
t.deskripsi.toLowerCase().includes("qris")
){
metode="QRIS"
}

const date=new Date(t.tanggal)

const tanggal=date.toLocaleDateString('id-ID')

const waktu=date.toLocaleTimeString('id-ID')

return`

<tr>

<td>
${tanggal}<br>
<small style="color:#94a3b8">${waktu}</small>
</td>

<td>${t.kategori}</td>

<td class="${
metode=="QRIS"?"qris":"transfer"
}">
${metode}
</td>

<td>${t.tujuan ?? "-"}</td>

<td class="nominal" style="text-align:right">
Rp ${t.jumlah.toLocaleString('id-ID')}
</td>

</tr>

`

}).join("")

}catch(e){

console.log("update gagal",e)

}

}

function downloadPDF(){

const element=document.body

html2pdf().set({

margin:10,
filename:'laporan_keuangan.pdf',
image:{type:'jpeg',quality:0.98},
html2canvas:{scale:2},
jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}

}).from(element).save()

}

refreshDashboard()

setInterval(refreshDashboard,10000)

</script>

</body>

</html>
