<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Finance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js"></script>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{max-width:1100px;margin:auto}

h2{margin-bottom:10px}

.card{
background:#1e293b;
padding:18px;
border-radius:14px;
margin-bottom:15px;
box-shadow:0 0 15px rgba(0,0,0,.3);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.value{
font-size:26px;
font-weight:bold;
margin-top:8px;
}

input,select,button{
padding:10px;
border-radius:8px;
border:none;
margin:5px 0;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{opacity:.85}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
font-size:14px;
}

th{color:#94a3b8;text-align:left}

canvas{
max-height:260px;
}

.qris{color:#22c55e;font-weight:bold}
.transfer{color:#38bdf8;font-weight:bold}

.logout{
float:right;
background:#ef4444;
}

</style>
</head>

<body>

<div class="container" id="pdfArea">

<h2>
Dashboard Keuangan
<button class="logout" onclick="logout()">Logout</button>
</h2>

<!-- SUMMARY -->
<div class="grid">

<div class="card">
Total Aset
<div class="value" id="v-asset">Rp0</div>
</div>

<div class="card">
Pengeluaran
<div class="value" id="v-exp">Rp0</div>
</div>

<div class="card">
Saldo Bersih
<div class="value" id="v-net">Rp0</div>
</div>

</div>

<!-- INPUT -->
<div class="card">
<h3>Tambah Transaksi</h3>

<select id="kat">
<option value="saldo_net">Saldo</option>
<option value="pengeluaran">Pengeluaran</option>
<option value="dana_darurat">Dana Darurat</option>
<option value="investasi">Investasi</option>
</select>

<input id="tujuan" placeholder="Tujuan / Rekening">

<input id="jumlah" type="number" placeholder="Nominal">

<button onclick="tambah()">Tambah</button>
</div>

<!-- FILTER -->
<div class="card">
Filter Bulan:
<select id="bulan" onchange="renderTable()">
<option value="all">Semua</option>
</select>

<button onclick="downloadPDF()">Download PDF</button>
</div>

<!-- GRAFIK -->
<div class="grid">

<div class="card">
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<canvas id="pieChart"></canvas>
</div>

</div>

<!-- TABLE -->
<div class="card">
<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Waktu</th>
<th>Kategori</th>
<th>Metode</th>
<th>Tujuan</th>
<th style="text-align:right">Nominal</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

/* ================= CONFIG ================= */

const API="https://API-WORKER-KAMU.workers.dev"

/* ===== AUTO LOGOUT 3 MENIT ===== */

let timer
function resetTimer(){
clearTimeout(timer)
timer=setTimeout(logout,180000)
}
document.onclick=resetTimer
document.onmousemove=resetTimer
resetTimer()

function logout(){
alert("Session habis")
location.reload()
}

/* ===== FORMAT ===== */

function rupiah(n){
return "Rp"+Number(n).toLocaleString("id-ID")
}

/* ===== DATA ===== */

let raw=[]

async function refresh(){

const d=await fetch(API+"/api/data").then(r=>r.json())

document.getElementById("v-asset").innerText=
rupiah((d.dana_darurat||0)+(d.investasi||0))

document.getElementById("v-exp").innerText=
rupiah(d.pengeluaran||0)

document.getElementById("v-net").innerText=
rupiah(d.saldo_net_display||0)

loadTransaksi(d)

}

/* ===== LOAD TRANSAKSI ===== */

async function loadTransaksi(){

raw=await fetch(API+"/api/transaksi").then(r=>r.json())

buatFilterBulan()
renderTable()
updateCharts()

}

/* ===== FILTER BULAN ===== */

function buatFilterBulan(){

const set=new Set()

raw.forEach(t=>{
const d=new Date(t.tanggal)
set.add(`${d.getFullYear()}-${d.getMonth()+1}`)
})

const select=document.getElementById("bulan")

select.innerHTML=`<option value="all">Semua</option>`

set.forEach(v=>{
select.innerHTML+=`<option value="${v}">${v}</option>`
})

}

/* ===== RENDER TABLE FORMAT LAMA ===== */

function renderTable(){

const f=document.getElementById("bulan").value

const data=raw.filter(t=>{
if(f==="all")return true
const d=new Date(t.tanggal)
return `${d.getFullYear()}-${d.getMonth()+1}`===f
})

document.getElementById("table").innerHTML=
data.map(t=>{

const date=new Date(t.tanggal)

const metode=(t.deskripsi||"").toLowerCase()
.includes("qris")?"QRIS":"Transfer"

return`
<tr>
<td>${date.toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit'})}</td>
<td>${date.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</td>
<td>${t.kategori}</td>
<td class="${metode==='QRIS'?'qris':'transfer'}">${metode}</td>
<td>${t.tujuan||"-"}</td>
<td style="text-align:right">${rupiah(t.jumlah)}</td>
<td><button onclick="hapus('${t.id}')">Hapus</button></td>
</tr>
`

}).join("")

}

/* ===== TAMBAH ===== */

async function tambah(){

await fetch(API+"/api/tambah",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
kategori:kat.value,
tujuan:tujuan.value,
jumlah:Number(jumlah.value),
email_id:"user@mail.com"
})
})

refresh()
}

/* ===== HAPUS ===== */

async function hapus(id){

if(!confirm("Hapus transaksi?"))return

await fetch(API+"/api/hapus/"+id,{method:"DELETE"})
refresh()

}

/* ===== CHART ===== */

let line,pie

function updateCharts(){

const saldo=raw.filter(t=>t.kategori==="saldo_net")
.map(t=>t.jumlah)

const label=saldo.map((_,i)=>i+1)

if(line)line.destroy()

line=new Chart(lineChart,{
type:'line',
data:{labels:label,datasets:[{data:saldo}]}
})

const darurat=raw
.filter(t=>t.kategori==="dana_darurat")
.reduce((a,b)=>a+b.jumlah,0)

const investasi=raw
.filter(t=>t.kategori==="investasi")
.reduce((a,b)=>a+b.jumlah,0)

if(pie)pie.destroy()

pie=new Chart(pieChart,{
type:'pie',
data:{
labels:['Dana Darurat','Investasi'],
datasets:[{data:[darurat,investasi]}]
}
})

}

/* ===== PDF ===== */

function downloadPDF(){
html2pdf().from(document.getElementById("pdfArea"))
.save("laporan.pdf")
}

/* START */
refresh()

</script>

</body>
</html>
