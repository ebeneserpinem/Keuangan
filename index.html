<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sentinel Finance - Ultra Premium Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --brand: #6366f1;
            --brand-light: #818cf8;
            --success: #10b981;
            --danger: #f43f5e;
            --bg: #0b0f1a;
            --card-bg: rgba(23, 28, 48, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text-p: #f8fafc;
            --text-s: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text-p);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 40%);
        }

        /* --- LAYOUT --- */
        nav {
            width: 280px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); padding: 40px 20px;
            display: flex; flex-direction: column; gap: 30px; position: sticky; top: 0; height: 100vh;
        }
        @media (max-width: 1024px) { nav { display: none; } }

        .nav-item {
            padding: 14px 20px; border-radius: 12px; color: var(--text-s); font-weight: 600;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .nav-item.active { background: var(--brand); color: white; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        main { flex: 1; padding: 40px; max-width: 1200px; margin: auto; width: 100%; }

        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 28px; padding: 30px; backdrop-filter: blur(10px);
            transition: 0.3s; margin-bottom: 20px;
        }
        .card:hover { border-color: rgba(99, 102, 241, 0.5); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .label { font-size: 11px; font-weight: 700; color: var(--text-s); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .value { font-size: 2rem; font-weight: 800; font-family: 'Space Grotesk', sans-serif; }

        /* --- INPUT & TABLE --- */
        .quick-action { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        input, select {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 14px 18px; border-radius: 14px; color: white; font-weight: 500; font-family: inherit;
        }
        input:focus, select:focus { border-color: var(--brand); outline: none; background: rgba(255,255,255,0.1); }
        
        .btn-add { background: var(--brand); border: none; padding: 14px; border-radius: 14px; color: white; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-add:hover { transform: translateY(-2px); filter: brightness(1.1); }

        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.02); padding: 18px; text-align: left; font-size: 11px; color: var(--text-s); }
        td { padding: 18px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .type-pill { padding: 5px 10px; border-radius: 100px; font-size: 10px; font-weight: 800; }
        .pill-in { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .pill-out { background: rgba(244, 63, 94, 0.1); color: var(--danger); }

        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="text-align: center; width: 350px;">
        <h2 style="margin-bottom: 20px;">Sentinel <span style="color:var(--brand)">Auth</span></h2>
        <input type="password" id="passInput" placeholder="Sandi Akses" style="text-align: center; margin-bottom: 15px; width: 100%;">
        <button onclick="login()" class="btn-add" style="width: 100%;">AUTHENTICATE</button>
    </div>
</div>

<nav>
    <div style="font-size: 22px; font-weight: 800; padding: 0 20px;">Sentinel<span style="color:var(--brand)">.</span></div>
    <div style="margin-top: 20px;">
        <div class="nav-item active">🏠 Dashboard</div>
        <div class="nav-item">📈 Investasi</div>
        <div class="nav-item">🛡️ Proteksi</div>
    </div>
</nav>

<main id="main-content" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <div>
            <h1 style="font-size: 24px;">Ikhtisar Keuangan</h1>
            <p style="color: var(--text-s); font-size: 14px;">Logika Patch Management v3.2 Terpasang</p>
        </div>
        <button onclick="logout()" class="btn-add" style="background: var(--danger); padding: 10px 20px;">Lock Vault</button>
    </div>

    <div class="stats-grid">
        <div class="card"><span class="label">Total Aset</span><div id="v-asset" class="value" style="color: var(--success);">Rp 0</div></div>
        <div class="card"><span class="label">Pengeluaran Bulan Ini</span><div id="v-exp" class="value" style="color: var(--danger);">Rp 0</div></div>
        <div class="card"><span class="label">Likuiditas</span><div id="v-net" class="value" style="color: var(--brand);">Rp 0</div></div>
    </div>

    <div class="card">
        <span class="label">Entry Transaksi Baru</span>
        <div class="quick-action">
            <select id="f-kat">
                <option value="pemasukan">INFLOW (PEMASUKAN)</option>
                <option value="pengeluaran">OUTFLOW (PENGELUARAN)</option>
                <option value="dana_darurat">EMERGENCY (DANA DARURAT)</option>
            </select>
            <input type="text" id="f-desc" placeholder="Keterangan">
            <input type="number" id="f-amt" placeholder="Nominal (Tanpa Titik)">
            <button onclick="simpan()" class="btn-add">CATAT DATA</button>
        </div>
    </div>

    <div class="card" style="padding: 0; overflow: hidden;">
        <div style="padding: 25px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
            <span class="label" style="margin:0">Log Transaksi</span>
            <select id="monthFilter" onchange="renderTableWithFilter()" style="padding: 8px 15px; font-size: 12px; width: auto; border-radius: 8px;">
                <option value="all">SEMUA BULAN</option>
            </select>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>TANGGAL</th>
                        <th>TIPE</th>
                        <th>DESKRIPSI</th>
                        <th style="text-align: right;">NOMINAL</th>
                        <th style="text-align: center;">CMD</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</main>

<script>
    const API = "https://finance-worker.ebeneserpinem6.workers.dev";
    let rawTransactions = []; // Simpan data mentah untuk filter

    function login() {
        if(document.getElementById('passInput').value === "12345") {
            localStorage.setItem("vault_key", "valid");
            checkAuth();
        } else { alert("Akses Ditolak!"); }
    }

    function logout() { localStorage.removeItem("vault_key"); location.reload(); }

    function checkAuth() {
        if(localStorage.getItem("vault_key")) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            refresh();
        }
    }

    async function refresh() {
        try {
            const res = await fetch(API + "/api/data");
            const d = await res.json();
            
            document.getElementById("v-asset").innerText = "Rp " + d.totalAsset.toLocaleString('id-ID');
            document.getElementById("v-exp").innerText = "Rp " + d.pengeluaran.toLocaleString('id-ID');
            document.getElementById("v-net").innerText = "Rp " + d.saldoBersih.toLocaleString('id-ID');

            loadTransactions();
        } catch (e) { console.error("Sync Error"); }
    }

    async function loadTransactions() {
        const res = await fetch(API + "/api/transaksi");
        rawTransactions = await res.json();
        
        // Update filter dropdown secara dinamis
        updateMonthOptions(rawTransactions);
        renderTableWithFilter();
    }

    function updateMonthOptions(data) {
        const filter = document.getElementById('monthFilter');
        const months = [...new Set(data.map(t => {
            const d = new Date(t.tanggal);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        }))].sort().reverse();

        let html = '<option value="all">SEMUA BULAN</option>';
        months.forEach(m => {
            const [year, month] = m.split('-');
            const name = new Date(year, month - 1).toLocaleString('id-ID', { month: 'long', year: 'numeric' });
            html += `<option value="${m}">${name.toUpperCase()}</option>`;
        });
        filter.innerHTML = html;
    }

    function renderTableWithFilter() {
        const filterVal = document.getElementById('monthFilter').value;
        let filtered = rawTransactions;

        if(filterVal !== 'all') {
            filtered = rawTransactions.filter(t => {
                const d = new Date(t.tanggal);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` === filterVal;
            });
        }

        filtered.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));

        document.getElementById("tableBody").innerHTML = filtered.map(t => `
            <tr>
                <td style="color: var(--text-s); font-family: 'Space Grotesk'">${new Date(t.tanggal).toLocaleDateString()}</td>
                <td><span class="type-pill pill-${t.kategori === 'pengeluaran' ? 'out' : 'in'}">${t.kategori.toUpperCase()}</span></td>
                <td style="font-weight: 600;">${t.deskripsi}</td>
                <td style="text-align: right; font-family: 'Space Grotesk'; font-weight: 700; color: ${t.kategori === 'pengeluaran' ? 'var(--danger)' : 'var(--success)'}">
                    ${t.kategori === 'pengeluaran' ? '-' : '+'} Rp ${t.jumlah.toLocaleString('id-ID')}
                </td>
                <td style="text-align: center;">
                    <button onclick="hapus('${t.id}')" style="background:transparent; color: var(--text-s); border:none; cursor:pointer;">✕</button>
                </td>
            </tr>
        `).join("");
    }

    async function simpan() {
        const desc = document.getElementById('f-desc').value;
        const amt = document.getElementById('f-amt').value;
        const kat = document.getElementById('f-kat').value;

        if(!desc || !amt) return alert("Isi semua data!");

        // FIX: Kirim sebagai Number agar API mengenali pengeluaran
        const payload = {
            deskripsi: desc,
            jumlah: Number(amt), 
            kategori: kat,
            email_id: "user@mail.com"
        };

        try {
            const res = await fetch(API + "/api/tambah", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            
            if(res.ok) {
                document.getElementById('f-desc').value = "";
                document.getElementById('f-amt').value = "";
                refresh();
            }
        } catch (e) { alert("Gagal Simpan"); }
    }

    async function hapus(id) {
        if(confirm("Hapus transaksi?")) {
            await fetch(`${API}/api/hapus?id=${id}`, { method: "DELETE" });
            refresh();
        }
    }

    checkAuth();
</script>
</body>
</html>
