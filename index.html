<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Finance Dashboard Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --primary: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        /* login Overlay */
        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        /* Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 14px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .grid4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .gridChart {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .gridChart { grid-template-columns: 1fr; }
        }

        .big {
            font-size: 1.6em;
            font-weight: 800;
            margin-top: 8px;
            letter-spacing: -0.5px;
        }

        .net { color: var(--primary) }
        .asset { color: var(--success) }
        .expense { color: var(--danger) }

        /* Table Design */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; background: rgba(255,255,255,0.05); }
        th, td { padding: 14px; border-bottom: 1px solid var(--border); }
        
        .nominal { text-align: right; font-family: 'JetBrains Mono', monospace; }
        .qris { color: var(--success); font-weight: bold; }
        .transfer { color: var(--primary); font-weight: bold; }

        button {
            background: var(--primary);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: 600;
        }

        button.btn-outline {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        button:hover { opacity: 0.8; }

        /* PDF Export Styling */
        #pdf-content { padding: 20px; background: white !important; color: black !important; }
        .no-print { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2>Finance Login</h2>
        <p style="color: #94a3b8">Masukkan Password Dashboard</p>
        <input type="password" id="passInput" placeholder="Password...">
        <button onclick="login()" style="width: 100%; margin-top: 10px;">Masuk</button>
    </div>
</div>

<div id="main-content" style="display: none;">
    
    <div class="header">
        <h1>Dashboard</h1>
        <div>
            <button onclick="downloadPDF()">Export PDF</button>
            <button class="btn-outline" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="card" style="text-align:center; background: linear-gradient(145deg, #1e293b, #0f172a);">
        <h2 style="margin:0; font-size: 1rem; color: #94a3b8;">Total Saldo Bersih</h2>
        <div id="net" class="big net">Rp 0</div>
    </div>

    <div class="grid4">
        <div class="card">
            <small>Dana Darurat</small>
            <div id="darurat" class="big asset">Rp 0</div>
        </div>
        <div class="card">
            <small>Investasi</small>
            <div id="investasi" class="big asset">Rp 0</div>
        </div>
        <div class="card">
            <small>Pengeluaran</small>
            <div id="expense" class="big expense">Rp 0</div>
        </div>
        <div class="card">
            <small>Total Aset</small>
            <div id="asset" class="big asset">Rp 0</div>
        </div>
    </div>

    <div class="gridChart">
        <div class="card">
            <h3>Tren Keuangan</h3>
            <canvas id="chartLine"></canvas>
        </div>
        <div class="card">
            <h3>Alokasi Aset</h3>
            <div style="max-width: 250px; margin: auto;">
                <canvas id="chartPie"></canvas>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Riwayat Transaksi Terakhir</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Kategori</th>
                        <th>Metode</th>
                        <th>Tujuan</th>
                        <th class="nominal">Nominal</th>
                        <th style="text-align: center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="table"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API = "https://finance-worker.ebeneserpinem6.workers.dev";
    let chart, pieChart;

    /* --------- AUTH LOGIC --------- */
    function login() {
        const pass = document.getElementById('passInput').value;
        // Ganti '12345' dengan password keinginan Anda
        if(pass === "12345") {
            localStorage.setItem("fin_auth", "true");
            checkAuth();
        } else {
            alert("Password Salah!");
        }
    }

    function logout() {
        localStorage.removeItem("fin_auth");
        location.reload();
    }

    function checkAuth() {
        const auth = localStorage.getItem("fin_auth");
        if(auth === "true") {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('main-content').style.display = "block";
            refreshDashboard();
            // Start Auto Refresh
            setInterval(refreshDashboard, 15000);
        }
    }

    /* --------- CORE DATA LOGIC --------- */
    async function refreshDashboard() {
        try {
            // 1. Fetch Summary Data
            const res = await fetch(`${API}/api/data`);
            const d = await res.json();
            const totalAsset = d.dana_darurat + d.investasi;

            updateElement("net", `Rp ${d.saldo_net_display.toLocaleString('id-ID')}`);
            updateElement("darurat", `Rp ${d.dana_darurat.toLocaleString('id-ID')}`);
            updateElement("investasi", `Rp ${d.investasi.toLocaleString('id-ID')}`);
            updateElement("expense", `Rp ${d.pengeluaran.toLocaleString('id-ID')}`);
            updateElement("asset", `Rp ${totalAsset.toLocaleString('id-ID')}`);

            // 2. Line Chart
            const chartRes = await fetch(`${API}/api/chart`);
            const cData = await chartRes.json();
            renderLineChart(cData);

            // 3. Pie Chart
            renderPieChart(d.dana_darurat, d.investasi);

            // 4. Transactions Table
            const resTable = await fetch(`${API}/api/transaksi`);
            const list = await resTable.json();
            renderTable(list);

        } catch (e) {
            console.error("Fetch Error:", e);
        }
    }

    function updateElement(id, val) {
        const el = document.getElementById(id);
        if(el) el.innerText = val;
    }

    /* --------- CHART RENDERING --------- */
    function renderLineChart(data) {
        const ctx = document.getElementById("chartLine");
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.bulan,
                datasets: [
                    { label: 'Asset', data: data.asset, borderColor: '#22c55e', tension: 0.4, fill: true, backgroundColor: 'rgba(34, 197, 94, 0.1)' },
                    { label: 'Pengeluaran', data: data.pengeluaran, borderColor: '#ef4444', tension: 0.4 }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: 'white', font: { size: 12 } } } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } },
                    y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
                }
            }
        });
    }

    function renderPieChart(darurat, investasi) {
        const ctx = document.getElementById("chartPie");
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(ctx, {
            type: 'doughnut', // Lebih modern dibanding Pie biasa
            data: {
                labels: ["Dana Darurat", "Investasi"],
                datasets: [{
                    data: [darurat, investasi],
                    backgroundColor: ["#22c55e", "#38bdf8"],
                    borderWidth: 0
                }]
            },
            options: {
                plugins: { legend: { position: 'bottom', labels: { color: 'white', padding: 20 } } },
                cutout: '70%'
            }
        });
    }

    function renderTable(list) {
        const tbody = document.getElementById("table");
        tbody.innerHTML = list.map(t => {
            const date = new Date(t.tanggal);
            const tglFormatted = date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
            const jamFormatted = date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            
            const metode = (t.deskripsi || "").toLowerCase().includes("qris") ? "QRIS" : "Transfer";

            return `
                <tr>
                    <td>
                        <div style="font-weight:bold">${tglFormatted}</div>
                        <small style="color:#94a3b8">${jamFormatted}</small>
                    </td>
                    <td><span style="background:rgba(255,255,255,0.1); padding:4px 8px; border-radius:4px">${t.kategori}</span></td>
                    <td class="${metode === "QRIS" ? "qris" : "transfer"}">${metode}</td>
                    <td>${t.tujuan || "-"}</td>
                    <td class="nominal">Rp ${Number(t.jumlah).toLocaleString('id-ID')}</td>
                    <td style="text-align: center">
                        <button class="btn-outline" style="padding:4px 8px; font-size:11px" onclick="hapus('${t.id}')">Hapus</button>
                    </td>
                </tr>
            `;
        }).join("");
    }

    async function hapus(id) {
        if(!confirm("Yakin ingin menghapus transaksi ini?")) return;
        try {
            await fetch(`${API}/api/hapus?id=${id}`, { method: "DELETE" });
            refreshDashboard();
        } catch (e) { alert("Gagal menghapus"); }
    }

    /* --------- PDF BUG FIX --------- */
    function downloadPDF() {
        const element = document.body;
        const opt = {
            margin:       [10, 10],
            filename:     `Laporan_Keuangan_${new Date().getTime()}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { 
                scale: 2, 
                useCORS: true, 
                backgroundColor: '#0f172a' // Menjaga warna background di PDF
            },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };

        // Sembunyikan tombol saat download
        const buttons = document.querySelectorAll('button');
        buttons.forEach(b => b.style.visibility = 'hidden');

        html2pdf().set(opt).from(element).save().then(() => {
            buttons.forEach(b => b.style.visibility = 'visible');
        });
    }

    // Jalankan pengecekan login saat load
    checkAuth();

</script>
</body>
</html>
