<script>

const API="https://finance-worker.ebeneserpinem6.workers.dev"

let chart
let pieChart

async function refreshDashboard(){

try{

/* ================= SUMMARY ================= */

const res=await fetch(API+"/api/data")
const d=await res.json()

const asset=d.dana_darurat+d.investasi

document.getElementById("net").innerText=
"Rp "+d.saldo_net_display.toLocaleString('id-ID')

document.getElementById("darurat").innerText=
"Rp "+d.dana_darurat.toLocaleString('id-ID')

document.getElementById("investasi").innerText=
"Rp "+d.investasi.toLocaleString('id-ID')

document.getElementById("expense").innerText=
"Rp "+d.pengeluaran.toLocaleString('id-ID')

document.getElementById("asset").innerText=
"Rp "+asset.toLocaleString('id-ID')

/* ================= LINE CHART ================= */

const chartRes=await fetch(API+"/api/chart")
const data=await chartRes.json()

const ctx=document.getElementById("chartLine")

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:'line',
data:{
labels:data.bulan,
datasets:[
{
label:'Asset',
data:data.asset,
borderColor:'#22c55e',
tension:0.3
},
{
label:'Pengeluaran',
data:data.pengeluaran,
borderColor:'#ef4444',
tension:0.3
}
]
},
options:{
plugins:{legend:{labels:{color:'white'}}},
scales:{
x:{ticks:{color:'white'}},
y:{ticks:{color:'white'}}
}
}
})

/* ================= PIE CHART ================= */

const pie=document.getElementById("chartPie")

if(pieChart) pieChart.destroy()

pieChart=new Chart(pie,{
type:'pie',
data:{
labels:["Dana Darurat","Investasi"],
datasets:[{
data:[d.dana_darurat,d.investasi],
backgroundColor:["#22c55e","#38bdf8"]
}]
},
options:{
plugins:{legend:{labels:{color:'white'}}}
}
})

/* ================= TABLE ================= */

const resTable=await fetch(API+"/api/transaksi")
const list=await resTable.json()

const tbody=document.getElementById("table")

tbody.innerHTML=list.map(t=>{

const date=new Date(t.tanggal)

return `
<tr>
<td>${date.toLocaleDateString('id-ID')}</td>
<td>${t.kategori}</td>
<td>${t.tujuan ?? "-"}</td>
<td style="text-align:right">
Rp ${t.jumlah.toLocaleString('id-ID')}
</td>
<td>
<button onclick="hapus('${t.id}')">
Hapus
</button>
</td>
</tr>
`

}).join("")

}catch(e){
console.log("error",e)
}

}

/* ================= HAPUS ================= */

async function hapus(id){

if(!confirm("Hapus transaksi?")) return

await fetch(API+"/api/hapus?id="+id,{
method:"DELETE"
})

refreshDashboard()
}

/* ================= PDF FIX ================= */

function downloadPDF(){

const element=document.body

html2pdf().set({
margin:10,
filename:'laporan_keuangan.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'mm',format:'a4'}
}).from(element).save()

}

refreshDashboard()
setInterval(refreshDashboard,10000)

</script>
