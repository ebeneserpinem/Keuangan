<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Keuangan</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 0 15px rgba(0,0,0,.3);
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

input,select,button{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
opacity:.85;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
padding:8px;
border-bottom:1px solid #334155;
text-align:left;
}

canvas{
max-height:260px;
}

.deleteBtn{
background:#ef4444;
}

</style>
</head>

<body>

<div class="container">

<h2>💰 Dashboard Keuangan</h2>

<div class="card">

<input id="nama" placeholder="Nama transaksi">
<input id="jumlah" type="number" placeholder="Jumlah">
<select id="jenis">
<option value="pemasukan">Pemasukan</option>
<option value="pengeluaran">Pengeluaran</option>
</select>

<select id="bulan"></select>

<button onclick="tambah()">Tambah</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div class="grid">

<div class="card">
<h3>Grafik Keuangan</h3>
<canvas id="chartLine"></canvas>
</div>

<div class="card">
<h3>Komposisi Asset</h3>
<canvas id="chartPie"></canvas>
</div>

</div>

<div class="card">
<h3>Daftar Transaksi</h3>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Jumlah</th>
<th>Jenis</th>
<th>Bulan</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tabel"></tbody>

</table>

</div>

</div>

<script>

/////////////////////////
// AUTO LOGOUT 3 MENIT
/////////////////////////

let timer
function resetTimer(){
clearTimeout(timer)
timer=setTimeout(()=>{
alert("Session habis (3 menit tidak aktif)")
location.reload()
},180000)
}

document.onclick=resetTimer
document.onmousemove=resetTimer
resetTimer()

/////////////////////////
// DATA STORAGE (NO COOKIE)
/////////////////////////

let data = JSON.parse(localStorage.getItem("trx")||"[]")

/////////////////////////
// BULAN SELECT
/////////////////////////

const bulanList=[
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
]

const bulanSelect=document.getElementById("bulan")

bulanList.forEach((b,i)=>{
let opt=document.createElement("option")
opt.value=i
opt.text=b
bulanSelect.appendChild(opt)
})

/////////////////////////
// TAMBAH TRANSAKSI
/////////////////////////

function tambah(){

const nama=document.getElementById("nama").value
const jumlah=Number(document.getElementById("jumlah").value)
const jenis=document.getElementById("jenis").value
const bulan=document.getElementById("bulan").value

if(!nama||!jumlah)return alert("Isi data")

data.push({nama,jumlah,jenis,bulan})

simpan()
render()
}

/////////////////////////
// HAPUS TRANSAKSI
/////////////////////////

function hapus(index){
if(confirm("Hapus transaksi?")){
data.splice(index,1)
simpan()
render()
}
}

function simpan(){
localStorage.setItem("trx",JSON.stringify(data))
}

/////////////////////////
// RENDER TABEL
/////////////////////////

function render(){

const tbody=document.getElementById("tabel")
tbody.innerHTML=""

data.forEach((d,i)=>{
tbody.innerHTML+=`
<tr>
<td>${d.nama}</td>
<td>${d.jumlah}</td>
<td>${d.jenis}</td>
<td>${bulanList[d.bulan]}</td>
<td><button class="deleteBtn" onclick="hapus(${i})">Hapus</button></td>
</tr>`
})

updateChart()
}

/////////////////////////
// CHART
/////////////////////////

let chart
let pieChart

function updateChart(){

let pemasukan=0
let pengeluaran=0

data.forEach(d=>{
if(d.jenis==="pemasukan") pemasukan+=d.jumlah
else pengeluaran+=d.jumlah
})

const danaDarurat=pemasukan*0.2
const investasi=pemasukan*0.3

if(chart) chart.destroy()

chart=new Chart(
document.getElementById("chartLine"),
{
type:'bar',
data:{
labels:["Pemasukan","Pengeluaran"],
datasets:[{
label:"Total",
data:[pemasukan,pengeluaran]
}]
}
})

if(pieChart) pieChart.destroy()

pieChart=new Chart(
document.getElementById("chartPie"),
{
type:'pie',
data:{
labels:["Dana Darurat","Investasi"],
datasets:[{
data:[danaDarurat,investasi]
}]
}
})

}

/////////////////////////
// DOWNLOAD PDF (FIX BUG)
/////////////////////////

async function downloadPDF(){

const { jsPDF } = window.jspdf
const doc=new jsPDF()

doc.text("Laporan Keuangan",20,20)

let y=30

data.forEach(d=>{
doc.text(
`${d.nama} | ${d.jumlah} | ${d.jenis} | ${bulanList[d.bulan]}`,
20,y
)
y+=10
})

doc.save("laporan_keuangan.pdf")
}

render()

</script>

</body>
</html>
