<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Keuangan</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

input,select,button{
padding:8px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border-bottom:1px solid #ddd;
padding:8px;
}
</style>

</head>

<body>

<div class="card">
<h2>Saldo</h2>

<p>Net Saldo : <b id="saldo">0</b></p>
<p>Dana Darurat : <b id="darurat">0</b></p>
<p>Investasi : <b id="investasi">0</b></p>
<p>Total Asset : <b id="asset">0</b></p>

<canvas id="pieChart"></canvas>
</div>

<div class="card">

<h3>Tambah Transaksi</h3>

<input id="jumlah" type="number" placeholder="Jumlah">

<select id="jenis">
<option value="masuk">Dana diterima</option>
<option value="qris">QRIS</option>
<option value="pengeluaran">Pengeluaran</option>
<option value="darurat">Dana Darurat</option>
<option value="investasi">Investasi</option>
</select>

<button onclick="kirim()">Simpan</button>

</div>

<div class="card">

<h3>List Transaksi</h3>

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Jenis</th>
<th>Jumlah</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>

<script>

const workerURL="ISI_URL_WORKER_KAMU";

let chart;

async function load(){

const r = await fetch(workerURL+"?action=get");

const data = await r.json();

hitung(data.transaksi);

}

function hitung(transaksi){

let saldo=0;
let darurat=0;
let investasi=0;

let html="";

transaksi.reverse().forEach(t=>{

let j=Number(t.jumlah);

if(t.jenis=="masuk"){
saldo+=j;
}

if(t.jenis=="pengeluaran"){
saldo-=j;
}

if(t.jenis=="qris"){
saldo-=j;
}

if(t.jenis=="darurat"){
saldo-=j;
darurat+=j;
}

if(t.jenis=="investasi"){
saldo-=j;
investasi+=j;
}

html+=`
<tr>
<td>${t.tanggal}</td>
<td>${t.jenis}</td>
<td>${j}</td>
</tr>
`;

});

document.getElementById("saldo").innerText=saldo;
document.getElementById("darurat").innerText=darurat;
document.getElementById("investasi").innerText=investasi;
document.getElementById("asset").innerText=darurat+investasi;

document.getElementById("list").innerHTML=html;

pie(darurat,investasi);

}

function pie(darurat,investasi){

if(chart){
chart.destroy();
}

chart=new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{
labels:["Dana Darurat","Investasi"],
datasets:[{
data:[darurat,investasi]
}]
}
});

}

async function kirim(){

let jumlah=document.getElementById("jumlah").value;
let jenis=document.getElementById("jenis").value;

await fetch(workerURL,{
method:"POST",
body:JSON.stringify({
jumlah:jumlah,
jenis:jenis
})
});

load();

}

load();

</script>

</body>
</html>
