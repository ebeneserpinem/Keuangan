<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Finance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
padding:12px 20px;
background:#38bdf8;
border:none;
border-radius:8px;
cursor:pointer;
}

canvas{
max-width:400px;
margin:auto;
}

pre{
background:#020617;
padding:20px;
border-radius:10px;
margin-top:20px;
}

</style>

</head>
<body>

<h1>Finance Dashboard</h1>

<button onclick="loadData()">Ambil Data</button>

<h2 id="total">Total: 0</h2>

<canvas id="chart"></canvas>

<pre id="output">Belum ada data</pre>

<script>

let chart;

async function loadData(){

const output=document.getElementById("output");

try{

const response=await fetch(
"https://finance-worker.ebeneserpinem6.workers.dev/api/data"
);

const data=await response.json();

output.textContent=JSON.stringify(data,null,2);

document.getElementById("total").innerText=
"Total: Rp "+data.total.toLocaleString("id-ID");

const ctx=document.getElementById("chart");

if(chart){
chart.destroy();
}

chart=new Chart(ctx,{
type:"pie",
data:{
labels:["Dana Darurat","Investasi"],
datasets:[{
data:[
data.dana_darurat,
data.investasi
]
}]
}
});

}catch(e){

output.textContent="Error:\n"+e;

}

}

</script>

</body>
</html>
