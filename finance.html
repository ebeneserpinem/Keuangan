<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
color:#38bdf8;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#38bdf8;
color:black;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.card{
background:#020617;
padding:20px;
border-radius:10px;
margin:20px auto;
width:320px;
}

canvas{
max-width:400px;
margin:auto;
}

pre{
background:#020617;
padding:15px;
border-radius:10px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>🚀 Finance Dashboard</h1>

<button onclick="loadData()">Ambil Data</button>

<div class="card">
<h3>Total Dana</h3>
<h2 id="total">0</h2>
</div>

<canvas id="chart"></canvas>

<pre id="output">Belum ada data...</pre>

<script>

async function loadData(){

const output=document.getElementById("output");

output.textContent="Loading...";

try{

const res=await fetch(
"https://finance-worker.ebeneserpinem6.workers.dev/api/data"
);

const data=await res.json();

output.textContent=JSON.stringify(data,null,2);

document.getElementById("total").innerText=
"Rp "+data.total.toLocaleString("id-ID");

const ctx=document.getElementById("chart");

new Chart(ctx,{
type:"pie",
data:{
labels:["Dana Darurat","Investasi"],
datasets:[{
data:[
data.dana_darurat,
data.investasi
]
}]
}
});

}catch(e){

output.textContent="Error koneksi ke Worker:\n"+e;

}

}

</script>

</body>
</html>
